server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip Compression ──────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml
        font/woff2;

    # ── SPA Fallback ──────────────────────────────────────────────────────
    location /agent-builder/ {
        try_files $uri $uri/ /agent-builder/index.html;
    }

    # ── Security Headers ──────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Immutable Hashed Assets (JS, CSS, images, fonts) ──────────────────
    location ~* \.(?:js|css|png|jpg|jpeg|gif|webp|avif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Federation Manifest (must NOT be cached long-term) ────────────────
    location ~* remoteEntry\.json$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Service Worker files (must NOT be cached) ─────────────────────────
    location ~* ngsw(?:\.json|-worker\.js)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
    }
}
