<div class="builder-container">
    <!-- Main area for steps. Scrolls if there is heavy content. -->
    <main class="builder-content">
        <router-outlet></router-outlet>
    </main>

    <!-- Footer is fixed to the bottom. Contains stepper and navigation. -->
    <footer class="builder-footer">
        <div class="footer-left">
            <!-- "Back" button is hidden on the first step to preserve symmetry and avoid confusion -->
            @if (activeStepIndex() > 0) {
            <button tuiButton appearance="secondary" size="m" (click)="prevStep()">{{ view.buttons.back }}</button>
            }

            <!-- Reset button clears all state and goes to first step -->
            <button
                tuiButton
                appearance="flat"
                size="m"
                style="color: var(--tui-text-negative)"
                [iconStart]="view.icons.resetButton"
                (click)="reset()">
                {{ view.buttons.reset }}
            </button>
        </div>

        <div class="footer-center">
            <!-- Stepper is synced with the router and calls onStepClick when clicked manually -->
            <tui-stepper [activeItemIndex]="activeStepIndex()" (activeItemIndexChange)="onStepClick($event)">
                @for (step of view.steps; track step.id) {
                <button tuiStep [icon]="step.icon">{{ step.label }}</button>
                }
            </tui-stepper>
        </div>

        <div class="footer-right">
            <!-- On the last step (Review), show the Download button with an icon -->
            @if (activeStepIndex() === view.steps.length - 1) {
            <button
                tuiButton
                appearance="secondary"
                size="m"
                [iconStart]="view.icons.savePresetButton"
                (click)="savePreset()">
                {{ view.buttons.savePreset }}
            </button>
            <button tuiButton appearance="primary" size="m" [iconEnd]="view.icons.downloadButton" (click)="download()">
                {{ view.buttons.download }}
            </button>
            } @else {
            <!-- On the second-to-last step (Stack), show "Generate" instead of "Next" -->
            <button tuiButton appearance="primary" size="m" (click)="nextStep()">
                {{ activeStepIndex() === view.steps.length - 2 ? view.buttons.generate : view.buttons.next }}
            </button>
            }
        </div>
    </footer>
</div>
