<img class="welcome__hero" priority [ngSrc]="view.assets.hero" [alt]="view.labels.welcomeTitle" width="480"
  height="480" />

<div class="welcome__content">
  <h1 class="welcome__title">{{ view.labels.welcomeTitle }}</h1>
  <p class="welcome__description">
    {{ view.labels.welcomeDescription }}
  </p>
</div>

<button tuiButton class="welcome__action" type="button" size="l" routerLink="/builder">
  {{ view.buttons.getStarted }}
</button>
