<div class="welcome-container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; gap: 2rem; padding: 2rem;">
  <div class="content">
    <h1 style="font-size: 3rem; margin-bottom: 1rem;">{{ view.labels.welcomeTitle }}</h1>
    <p style="font-size: 1.25rem; color: var(--tui-text-02); max-width: 600px; margin: 0 auto;">
      {{ view.labels.welcomeDescription }}
    </p>
  </div>
  
  <button tuiButton type="button" size="l" routerLink="/builder">
    {{ view.buttons.getStarted }}
  </button>
</div>
