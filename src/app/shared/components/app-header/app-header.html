<div class="app-header__actions">
    <a
        [href]="view.githubRepoUrl"
        target="_blank"
        rel="noopener noreferrer"
        class="github-widget"
        [class.github-widget--dark]="view.isDark()">
        <img [src]="view.githubShieldUrl" alt="GitHub stars" />
    </a>
    <button
        tuiIconButton
        type="button"
        appearance="ghost"
        size="s"
        [iconStart]="view.themeIcon()"
        [attr.aria-label]="view.ariaLabel"
        (click)="toggleTheme()"></button>
</div>
