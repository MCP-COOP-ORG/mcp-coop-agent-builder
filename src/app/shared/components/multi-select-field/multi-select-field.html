<tui-textfield 
  multi 
  tuiChevron 
  tuiTextfieldSize="l"
  [stringify]="stringify"
>
  <label tuiLabel [for]="fieldId">{{ label() }}</label>
  <input 
    [id]="fieldId"
    tuiInputChip 
    [placeholder]="value.length ? '' : placeholder()" 
    [ngModel]="value"
    (ngModelChange)="onModelChange($event)"
    [disabled]="disabled"
  />
  <tui-input-chip *tuiItem />
  <tui-data-list *tuiDropdown tuiMultiSelectGroup>
    @for (option of options(); track option.id) {
      <button tuiOption [value]="option.id">
        {{ option.label }}
      </button>
    }
  </tui-data-list>
</tui-textfield>
