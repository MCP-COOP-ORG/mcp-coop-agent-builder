<div class="radio-group">
  @for (option of options(); track option.id) {
    <label class="radio-card" [class.radio-card--active]="value === option.id">
      <input 
        tuiRadio
        type="radio"
        size="m"
        [value]="option.id"
        [ngModel]="value"
        (ngModelChange)="onRadioChange(option.id)"
      />
      <span class="radio-card__label">{{ option.label }}</span>
    </label>
  }
</div>
