<tui-textfield tuiChevron [stringify]="stringify">
  <label tuiLabel [for]="fieldId">{{ label() }}</label>
  <input
    [id]="fieldId"
    tuiSelect
    [placeholder]="placeholder()"
    [ngModel]="value"
    (ngModelChange)="onModelChange($event)"
    [disabled]="disabled"
  />
  <tui-data-list *tuiDropdown>
    @for (item of options(); track item.id) {
      <button tuiOption type="button" [value]="item.id">
        {{ item.label }}
      </button>
    }
    @empty {
      <button tuiOption type="button" [disabled]="true">
        No options
      </button>
    }
  </tui-data-list>
</tui-textfield>
